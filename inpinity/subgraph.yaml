      startBlock: 42822147
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Protection
      abis:
        - name: MercenaryV1
          file: ./abis/MercenaryV1.json
      eventHandlers:
        - event: ProtectionBought(indexed uint256,uint256,uint256,uint256)
          handler: handleProtectionBought
        - event: ProtectionExpired(indexed uint256)
          handler: handleProtectionExpired
      file: ./src/mercenary.ts

  # ---------- PARTNERSHIP V1 ----------
  - kind: ethereum
    name: PartnershipV1
