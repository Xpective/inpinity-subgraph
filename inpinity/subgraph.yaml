        - event: PartnerTokenFound(indexed uint256,indexed address,uint256)
          handler: handlePartnerTokenFound
      file: ./src/partnership.ts

  # ---------- INPI Token (ERC20) ----------
  - kind: ethereum
    name: INPI
    network: base
    source:
      address: "0x232FB12582ac10d5fAd97e9ECa22670e8Ba67d0D"
