specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  # ---------- NFT ----------
  - kind: ethereum
    name: InpinityNFT
    network: base
    source:
      address: "0x277a0D5864293C78d7387C54B48c35D5E9578Ab1"
      abi: InpinityNFT
      startBlock: 42820334
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Approval
        - ApprovalForAll
        - BlockMirrored
        - BlockRevealed
        - MetadataUpdate
        - OwnershipTransferred
        - RowExpanded
        - Transfer
        - Token
        - User
      abis:
        - name: InpinityNFT
          file: ./abis/InpinityNFT.json
      eventHandlers:
        - event: Approval(indexed address,indexed address,indexed uint256)
          handler: handleApproval
        - event: ApprovalForAll(indexed address,indexed address,bool)
          handler: handleApprovalForAll
        - event: BlockMirrored(indexed uint256,indexed uint256)
          handler: handleBlockMirrored
        - event: BlockRevealed(indexed uint256,uint8,uint8,uint8)
          handler: handleBlockRevealed
        - event: MetadataUpdate(uint256)
          handler: handleMetadataUpdate
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: RowExpanded(uint256)
          handler: handleRowExpanded
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
      file: ./src/inpinity-nft.ts

  # ---------- FARMING V1 ----------
  - kind: ethereum
    name: FarmingV1
    network: base
    source:
      address: "0xd9722fB6e9b8e71399A970d4e8F4D628C532E94f"
      abi: FarmingV1
      startBlock: 42822062
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Farm
      abis:
        - name: FarmingV1
          file: ./abis/FarmingV1.json
      eventHandlers:
        - event: FarmStarted(indexed uint256,uint256)
          handler: handleFarmStarted
        - event: ResourcesClaimed(indexed uint256,uint8,uint256)
          handler: handleResourcesClaimed
        - event: ResourcesStolen(indexed uint256,indexed address,uint8,uint256)
          handler: handleResourcesStolen
      file: ./src/farming.ts

  # ---------- PIRATES V1 ----------
  - kind: ethereum
    name: PiratesV1
    network: base
    source:
      address: "0xfD4B74AFF77eeB03FA5bB64Ec701504757BF2585"
      abi: PiratesV1
      startBlock: 42822189
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Attack
      abis:
        - name: PiratesV1
          file: ./abis/PiratesV1.json
      eventHandlers:
        - event: AttackStarted(indexed uint256,indexed address,uint256,uint256)
          handler: handleAttackStarted
        - event: AttackExecuted(indexed uint256,indexed address,uint256)
          handler: handleAttackExecuted
      file: ./src/pirates.ts

  # ---------- MERCENARY V1 ----------
  - kind: ethereum
    name: MercenaryV1
    network: base
    source:
      address: "0x7719516e40A9E8b47d5967ED7E3cB4D528fd18DF"
