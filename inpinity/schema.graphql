# ---------- Event-Entitäten (NFT) ----------
type Approval @entity(immutable: true) {
  id: Bytes!
  owner: Bytes!
  approved: Bytes!
  tokenId: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type ApprovalForAll @entity(immutable: true) {
  id: Bytes!
  owner: Bytes!
  operator: Bytes!
  approved: Boolean!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type BlockMirrored @entity(immutable: true) {
  id: Bytes!
  tokenId: BigInt!
  mirrorId: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type BlockRevealed @entity(immutable: true) {
  id: Bytes!
  tokenId: BigInt!
  piDigit: Int!
  phiDigit: Int!
  rarity: Int!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type MetadataUpdate @entity(immutable: true) {
  id: Bytes!
  _tokenId: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type OwnershipTransferred @entity(immutable: true) {
  id: Bytes!
  previousOwner: Bytes!
  newOwner: Bytes!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type RowExpanded @entity(immutable: true) {
  id: Bytes!
  newRow: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Transfer @entity(immutable: true) {
  id: Bytes!
  from: Bytes!
  to: Bytes!
  tokenId: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

# ---------- Zustands-Entitäten (veränderlich) ----------
type Token @entity(immutable: false) {
  id: ID!                   # Token ID als String
  owner: User!
  revealed: Boolean!
  farm: Farm
}

type User @entity(immutable: false) {
  id: ID!                   # Adresse als String
  tokens: [Token!]! @derivedFrom(field: "owner")
}

# ---------- Farming V1 ----------
type Farm @entity(immutable: false) {
  id: ID!                   # Token ID
  startTime: BigInt!
  lastClaim: BigInt
  active: Boolean!
}

# ---------- Pirates V1/V2 ----------
type Attack @entity(immutable: false) {
  id: ID!                   # attackId (uint256)
  attacker: Bytes!          # Adresse des Angreifers
  target: BigInt!           # tokenId des Ziels
  startTime: BigInt!
  endTime: BigInt!
  executed: Boolean!
  stolenAmount: BigInt
}

# ---------- Mercenary V1/V2 ----------
type Protection @entity(immutable: false) {
  id: ID!                   # Token ID
  level: BigInt!            # Schutzlevel
  expiresAt: BigInt!
  active: Boolean!
}

# ---------- Partnership V1/V2 ----------
type Partnership @entity(immutable: false) {
  id: ID!                   # Token ID
  name: String!
  tokenAddress: Bytes!
  blockId: BigInt!
  active: Boolean!
}

# ---------- INPI Token ----------
type INPITransfer @entity(immutable: true) {
  id: Bytes!
  from: Bytes!
  to: Bytes!
  value: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type INPIApproval @entity(immutable: true) {
  id: Bytes!
  owner: Bytes!
  spender: Bytes!
  value: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

# ---------- Pitrone Token ----------
type PitroneTransfer @entity(immutable: true) {
  id: Bytes!
  from: Bytes!
  to: Bytes!
  value: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type PitroneApproval @entity(immutable: true) {
  id: Bytes!
