# ---------- ResourceToken (ERC1155) ----------
type ResourceTransfer @entity(immutable: true) {
  id: Bytes!
  operator: Bytes!
  from: Bytes!
  to: Bytes!
  resourceId: BigInt!
  amount: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type ResourceApprovalForAll @entity(immutable: true) {
  id: Bytes!
  owner: Bytes!
  operator: Bytes!
  approved: Boolean!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type ResourceBalance @entity(immutable: false) {
  id: ID!                     # "<adresse>-<resourceId>"
  account: Bytes!
  resourceId: BigInt!
  amount: BigInt!
}

# ---------- Farming V2 ----------
type FarmV2 @entity(immutable: false) {
  id: ID!                     # Token ID
  startTime: BigInt!
  lastClaim: BigInt
  active: Boolean!
}

type ResourceClaimed @entity(immutable: true) {
  id: Bytes!
  tokenId: BigInt!
  resourceId: BigInt!
  amount: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type ResourceStolen @entity(immutable: true) {
  id: Bytes!
  tokenId: BigInt!
  thief: Bytes!
  resourceId: BigInt!
  amount: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type ResourceDeposited @entity(immutable: true) {
  id: Bytes!
  tokenId: BigInt!
  resourceId: BigInt!
  amount: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}