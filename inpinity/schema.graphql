# ---------- PIRATES V3 ----------
type AttackV3 @entity(immutable: false) {
  id: ID!                 # "<targetTokenId>-<attackIndex>"
  attacker: Bytes!
  attackerTokenId: BigInt!
  target: BigInt!
  attackIndex: BigInt!
  startTime: BigInt!
  endTime: BigInt!
  resource: Int!
  executed: Boolean!
